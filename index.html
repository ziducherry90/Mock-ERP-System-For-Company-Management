<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Enterprise ERP</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        slate: {
                            50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8',
                            500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a', 950: '#020617'
                        },
                        brand: {
                            50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa',
                            500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Enterprise Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Smooth Rendering */
        body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        
        /* Animations */
        .fade-in { animation: fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide-up { animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Glassmorphism utility */
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans overflow-hidden selection:bg-brand-100 selection:text-brand-900">

    <!-- Root Container -->
    <div id="app-root" class="h-screen w-full flex"></div>

    <!-- Modal Container -->
    <div id="modal-root"></div>

<script>
/**
 * ==========================================
 * MOCK DATABASE & CONFIGURATION
 * ==========================================
 */
const INITIAL_USERS = [
    { id: 1, username: 'admin', password: 'password', role: 'admin', name: 'System Admin' },
    { id: 2, username: 'editor', password: 'password', role: 'editor', name: 'Content Editor' },
    { id: 3, username: 'mod', password: 'password', role: 'moderator', name: 'Community Mod' }
];

const INITIAL_DB = {
    inventory: [
        { id: 1, name: 'Enterprise Server Blade', sku: 'SRV-001', quantity: 15, threshold: 20, price: 2500, category: 'Hardware', supplier: 'TechCorp Inc.' },
        { id: 2, name: 'Ergonomic Office Chair', sku: 'FURN-102', quantity: 42, threshold: 10, price: 350, category: 'Furniture', supplier: 'OfficePlus' },
        { id: 3, name: '27" 4K Monitor', sku: 'DISP-4K', quantity: 5, threshold: 15, price: 400, category: 'Electronics', supplier: 'TechCorp Inc.' },
        { id: 4, name: 'Cloud Storage 1TB (Annual)', sku: 'SW-CLD-1T', quantity: 999, threshold: 50, price: 120, category: 'Software', supplier: 'CloudNet' },
    ],
    customers: [
        { id: 1, name: 'Acme Corporation', email: 'contact@acme.corp', phone: '+1 (555) 0192', company: 'Acme Corp', address: '123 Acme Way, New York, NY', status: 'Active', totalSpent: 45000 },
        { id: 2, name: 'Globex Industries', email: 'info@globex.com', phone: '+1 (555) 0987', company: 'Globex', address: '404 Industrial Pkwy, Chicago, IL', status: 'Inactive', totalSpent: 12500 },
        { id: 3, name: 'Soylent Corp', email: 'sales@soylent.co', phone: '+1 (555) 1122', company: 'Soylent Corp', address: '99 Green St, San Francisco, CA', status: 'Active', totalSpent: 89000 },
    ],
    suppliers: [
        { id: 1, name: 'TechCorp Inc.', contact: 'John Smith', email: 'sales@techcorp.com', phone: '+1 (800) 123-4567', address: '100 Silicon Valley Rd, CA', status: 'Active' },
        { id: 2, name: 'OfficePlus', contact: 'Jane Doe', email: 'b2b@officeplus.com', phone: '+1 (800) 987-6543', address: '50 Business Pkwy, NY', status: 'Active' },
        { id: 3, name: 'CloudNet', contact: 'Sam Wilson', email: 'partners@cloudnet.io', phone: '+44 20 7946 0958', address: 'London, UK', status: 'Inactive' }
    ],
    transactions: [
        { id: 1, date: '2026-04-15', type: 'revenue', amount: 15000, description: 'Server bulk order (Acme)', category: 'Hardware Sales', method: 'Bank Transfer' },
        { id: 2, date: '2026-04-18', type: 'loss', amount: 2500, description: 'Office supplies & maintenance', category: 'Operational Exp', method: 'bKash' },
        { id: 3, date: '2026-04-20', type: 'revenue', amount: 4500, description: 'Monitor sales', category: 'Electronics Sales', method: 'Nagad' },
        { id: 4, date: '2026-04-21', type: 'loss', amount: 8000, description: 'Payroll and employee benefits', category: 'Payroll', method: 'Bank Transfer' },
    ],
    profile: {
        name: 'Nexus Enterprises Ltd.', email: 'contact@nexus-erp.com.bd', phone: '+880 1711-000000',
        address: 'Level 4, Tech Tower, Banani, Dhaka-1213, Bangladesh', website: 'www.nexus-erp.com.bd', taxId: 'BIN-000123456789', established: '2020',
        industry: 'Technology', size: '51-200', currency: 'BDT'
    }
};

const EMPTY_DB = {
    inventory: [], customers: [], suppliers: [], transactions: [],
    profile: { name: '', email: '', phone: '', address: '', website: '', taxId: '', established: new Date().getFullYear().toString(), industry: '', size: '', currency: 'USD' }
};

const PERMISSIONS = {
    admin: { inventory: ['add', 'edit', 'delete', 'sell'], customers: ['add', 'edit', 'delete'], suppliers: ['add', 'edit', 'delete'], accounts: ['add', 'delete'], profile: ['edit'] },
    editor: { inventory: ['add', 'edit', 'sell'], customers: ['add', 'edit'], suppliers: ['add', 'edit'], accounts: ['add'], profile: [] },
    moderator: { inventory: [], customers: ['add'], suppliers: ['add'], accounts: [], profile: [] }
};

/**
 * ==========================================
 * APPLICATION STATE & CORE LOGIC
 * ==========================================
 */
const app = {
    state: {
        user: null,
        db: JSON.parse(JSON.stringify(INITIAL_DB)),
        currentTab: 'auth', // auth, induction, dashboard, inventory, customers, suppliers, accounts, profile
        authMode: 'login', // login, register
        isMobileMenuOpen: false,
        authError: '',
        tourStep: 0 // For the onboarding walkthrough
    },

    init() {
        this.render();
    },

    hasPermission(resource, action) {
        if (!this.state.user) return false;
        return PERMISSIONS[this.state.user.role]?.[resource]?.includes(action) || false;
    },

    formatCurrency(amount) {
        const symbols = { 'USD': '$', 'EUR': '€', 'GBP': '£', 'BDT': '৳', 'INR': '₹' };
        const currencyCode = this.state.db?.profile?.currency || 'BDT';
        const symbol = symbols[currencyCode] || '৳';
        return symbol + Number(amount).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    },

    setTab(tab) {
        this.state.currentTab = tab;
        this.state.isMobileMenuOpen = false;
        this.render();
    },

    toggleMobileMenu() {
        this.state.isMobileMenuOpen = !this.state.isMobileMenuOpen;
        this.render();
    },

    logout() {
        this.state.user = null;
        this.state.currentTab = 'auth';
        this.render();
    },

    /**
     * ==========================================
     * RENDERING ENGINE
     * ==========================================
     */
    render() {
        const root = document.getElementById('app-root');
        
        if (!this.state.user) {
            root.innerHTML = this.views.auth();
        } else if (this.state.currentTab === 'induction') {
            root.innerHTML = this.views.induction();
        } else {
            root.innerHTML = this.views.layout();
            const mainContent = document.getElementById('main-content');
            if (this.views[this.state.currentTab]) {
                mainContent.innerHTML = this.views[this.state.currentTab]();
            }
        }
        lucide.createIcons();
    },

    /**
     * ==========================================
     * VIEWS
     * ==========================================
     */
    views: {
        // --- AUTHENTICATION VIEW ---
        auth() {
            const isLogin = app.state.authMode === 'login';
            
            const loginForm = `
                <form onsubmit="app.actions.login(event)" class="space-y-4 mt-8">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">User ID</label>
                        <input name="username" type="text" required class="w-full p-3 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition text-sm shadow-sm" placeholder="e.g. admin" />
                    </div>
                    <div>
                        <div class="flex justify-between items-center mb-1.5">
                            <label class="block text-sm font-semibold text-slate-700">Password</label>
                            <a href="#" class="text-xs font-semibold text-brand-600 hover:text-brand-700">Forgot password?</a>
                        </div>
                        <input name="password" type="password" required class="w-full p-3 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition text-sm shadow-sm" placeholder="••••••••" />
                    </div>
                    <button type="submit" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3 rounded-lg transition duration-200 text-sm mt-6 shadow-sm flex justify-center items-center gap-2">
                        Sign In to Workspace <i data-lucide="arrow-right" class="w-4 h-4"></i>
                    </button>
                </form>
            `;

            const registerForm = `
                <form onsubmit="app.actions.register(event)" class="space-y-4 mt-8">
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">First Name</label>
                            <input name="firstName" type="text" required class="w-full p-3 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition text-sm shadow-sm" placeholder="Jane" />
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Last Name</label>
                            <input name="lastName" type="text" required class="w-full p-3 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition text-sm shadow-sm" placeholder="Doe" />
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Work Email</label>
                        <input name="email" type="email" required class="w-full p-3 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition text-sm shadow-sm" placeholder="jane.doe@company.com" />
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Workspace User ID</label>
                        <input name="username" type="text" required class="w-full p-3 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition text-sm shadow-sm" placeholder="e.g. janedoe" />
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Secure Password</label>
                        <input name="password" type="password" required class="w-full p-3 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition text-sm shadow-sm" placeholder="••••••••" />
                        <p class="text-xs text-slate-500 mt-1.5 font-medium flex items-center gap-1"><i data-lucide="info" class="w-3 h-3"></i> Must be at least 8 characters long.</p>
                    </div>
                    <div class="flex items-start gap-3 mt-6">
                        <input type="checkbox" required class="mt-1 border-slate-300 rounded text-brand-600 focus:ring-brand-500 cursor-pointer" id="terms" />
                        <label for="terms" class="text-xs text-slate-600 font-medium leading-relaxed cursor-pointer">
                            I agree to the <a href="#" onclick="app.actions.showLegalModal('tos'); return false;" class="text-brand-600 hover:underline">Terms of Service</a>, <a href="#" onclick="app.actions.showLegalModal('privacy'); return false;" class="text-brand-600 hover:underline">Privacy Policy</a>, and accept electronic communications.
                        </label>
                    </div>
                    <button type="submit" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 rounded-lg transition duration-200 text-sm mt-4 shadow-sm flex justify-center items-center gap-2">
                        Create Enterprise Account
                    </button>
                </form>
            `;

            return `
            <div class="min-h-screen flex w-full bg-slate-50 fade-in">
                <!-- Left Panel (Branding) -->
                <div class="hidden lg:flex w-[45%] bg-slate-900 p-12 flex-col justify-between relative overflow-hidden text-white">
                    <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjIiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz48L3N2Zz4=')] opacity-50"></div>
                    <div class="absolute top-[-20%] left-[-10%] w-96 h-96 bg-brand-500/20 rounded-full blur-3xl"></div>
                    
                    <div class="relative z-10">
                        <div class="flex items-center gap-3 mb-16">
                            <div class="bg-brand-600 p-2 rounded-lg shadow-md"><i data-lucide="layout-dashboard" class="w-6 h-6"></i></div>
                            <span class="text-2xl font-bold tracking-tight">Nexus ERP</span>
                        </div>
                        <h1 class="text-4xl font-extrabold leading-tight mb-6">The professional standard for enterprise management.</h1>
                        <p class="text-slate-400 text-lg leading-relaxed max-w-md">Seamlessly integrate your inventory, financials, and customer relations into one unified, secure platform.</p>
                    </div>
                    
                    <div class="relative z-10 text-sm text-slate-500 font-medium">
                        &copy; ${new Date().getFullYear()} Nexus Enterprises Ltd. All rights reserved.
                    </div>
                </div>

                <!-- Right Panel (Form) -->
                <div class="w-full lg:w-[55%] h-screen overflow-y-auto flex flex-col justify-center items-center p-8 sm:p-12 bg-white relative">
                    <div class="w-full max-w-md slide-up py-10">
                        <div class="flex lg:hidden items-center gap-3 mb-12 justify-center">
                            <div class="bg-brand-600 p-2 rounded-lg shadow-md"><i data-lucide="layout-dashboard" class="w-6 h-6 text-white"></i></div>
                            <span class="text-2xl font-bold tracking-tight text-slate-900">Nexus ERP</span>
                        </div>

                        <div class="text-center lg:text-left mb-8">
                            <h2 class="text-3xl font-extrabold text-slate-900 mb-2">${isLogin ? 'Welcome back' : 'Create an Account'}</h2>
                            <p class="text-slate-500 font-medium text-sm">${isLogin ? 'Enter your credentials to access your workspace.' : 'Initialize a fresh enterprise environment.'}</p>
                        </div>

                        ${app.state.authError ? `
                        <div class="bg-red-50 border border-red-200 text-red-700 p-3.5 text-sm flex items-start gap-3 rounded-lg mb-6">
                            <i data-lucide="alert-circle" class="w-5 h-5 shrink-0 mt-0.5"></i> <p class="font-medium">${app.state.authError}</p>
                        </div>` : ''}

                        ${isLogin ? loginForm : registerForm}

                        <p class="mt-8 text-center text-sm font-medium text-slate-500">
                            ${isLogin ? "Don't have an account?" : "Already have an account?"} 
                            <button onclick="app.state.authMode = '${isLogin ? 'register' : 'login'}'; app.state.authError = ''; app.render();" class="text-brand-600 font-semibold hover:text-brand-700 transition ml-1">
                                ${isLogin ? 'Register now' : 'Sign in instead'}
                            </button>
                        </p>

                        ${isLogin ? `
                        <div class="mt-10 pt-8 border-t border-slate-200">
                            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest text-center mb-4">Demo Credentials</p>
                            <div class="space-y-2">
                                <div class="flex justify-between items-center p-3 border border-slate-200 rounded-lg bg-slate-50">
                                    <span class="font-mono text-xs font-semibold text-slate-700">admin / password</span>
                                    <span class="text-[10px] font-bold uppercase tracking-wide text-brand-700 bg-brand-100 px-2 py-0.5 rounded">Admin</span>
                                </div>
                                <div class="flex justify-between items-center p-3 border border-slate-200 rounded-lg bg-slate-50">
                                    <span class="font-mono text-xs font-semibold text-slate-700">editor / password</span>
                                    <span class="text-[10px] font-bold uppercase tracking-wide text-emerald-700 bg-emerald-100 px-2 py-0.5 rounded">Editor</span>
                                </div>
                            </div>
                        </div>` : ''}
                    </div>
                </div>
            </div>`;
        },

        // --- INDUCTION (ONBOARDING) VIEW ---
        induction() {
            return `
            <div class="min-h-screen flex w-full bg-slate-100 items-center justify-center p-4 fade-in relative">
                <!-- Abstract Background -->
                <div class="absolute top-0 left-0 w-full h-72 bg-slate-900 overflow-hidden">
                    <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjIiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz48L3N2Zz4=')] opacity-50"></div>
                </div>
                
                <div class="max-w-3xl w-full bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden z-10 slide-up my-10">
                    <div class="bg-slate-900 px-8 py-10 text-white text-center relative overflow-hidden">
                        <div class="absolute top-[-50%] left-[20%] w-64 h-64 bg-brand-500/20 rounded-full blur-3xl"></div>
                        <div class="w-16 h-16 bg-white/10 border border-white/20 text-white rounded-2xl flex items-center justify-center mx-auto mb-6 backdrop-blur-sm relative z-10">
                            <i data-lucide="settings" class="w-8 h-8"></i>
                        </div>
                        <h1 class="text-3xl font-bold mb-2 relative z-10 tracking-tight">Welcome to Nexus, ${app.state.user.name.split(' ')[0]}</h1>
                        <p class="text-slate-300 font-medium relative z-10">Let's configure your enterprise workspace before we dive in.</p>
                    </div>

                    <div class="p-8 sm:p-10">
                        <form onsubmit="app.actions.completeInduction(event)" class="space-y-6">
                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                <div class="sm:col-span-2">
                                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Company Legal Name <span class="text-red-500">*</span></label>
                                    <input name="name" type="text" required class="w-full p-3 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition text-sm shadow-sm" placeholder="e.g. Acme Corporation Ltd." />
                                </div>
                                
                                <div>
                                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Business Email <span class="text-red-500">*</span></label>
                                    <input name="email" type="email" value="${app.state.user.email || ''}" required class="w-full p-3 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition text-sm shadow-sm" placeholder="admin@acme.corp" />
                                </div>
                                
                                <div>
                                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Corporate Phone Number</label>
                                    <input name="phone" type="tel" class="w-full p-3 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition text-sm shadow-sm" placeholder="+1 (555) 000-0000" />
                                </div>

                                <div>
                                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Industry / Sector</label>
                                    <select name="industry" class="w-full p-3 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none transition text-sm shadow-sm font-medium text-slate-700">
                                        <option value="Technology">Technology & Software</option>
                                        <option value="Retail">Retail & E-commerce</option>
                                        <option value="Manufacturing">Manufacturing & Logistics</option>
                                        <option value="Healthcare">Healthcare & Biotech</option>
                                        <option value="Finance">Finance & Consulting</option>
                                        <option value="Other">Other</option>
                                    </select>
                                </div>

                                <div>
                                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Company Size</label>
                                    <select name="size" class="w-full p-3 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none transition text-sm shadow-sm font-medium text-slate-700">
                                        <option value="1-10">1-10 Employees</option>
                                        <option value="11-50">11-50 Employees</option>
                                        <option value="51-200">51-200 Employees</option>
                                        <option value="201-500">201-500 Employees</option>
                                        <option value="500+">500+ Employees</option>
                                    </select>
                                </div>

                                <div>
                                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Base Currency <span class="text-red-500">*</span></label>
                                    <select name="currency" required class="w-full p-3 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 outline-none transition text-sm shadow-sm font-medium text-slate-700">
                                        <option value="USD">USD ($) - US Dollar</option>
                                        <option value="EUR">EUR (€) - Euro</option>
                                        <option value="GBP">GBP (£) - British Pound</option>
                                        <option value="BDT" selected>BDT (৳) - Bangladeshi Taka</option>
                                        <option value="INR">INR (₹) - Indian Rupee</option>
                                    </select>
                                </div>

                                <div>
                                    <label class="block text-sm font-semibold text-slate-700 mb-1.5">Tax ID / Registration No.</label>
                                    <input name="taxId" type="text" class="w-full p-3 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition text-sm shadow-sm font-mono" placeholder="Optional for now" />
                                </div>
                            </div>
                            
                            <div class="pt-6 mt-8 border-t border-slate-100 flex items-center justify-between">
                                <p class="text-xs text-slate-500 font-medium">You can change these settings later in your profile.</p>
                                <button type="submit" class="bg-brand-600 hover:bg-brand-700 text-white font-bold py-3 px-8 rounded-lg transition duration-200 text-sm shadow-md flex items-center justify-center gap-2">
                                    Complete Setup & Launch <i data-lucide="rocket" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>`;
        },

        // --- MAIN APPLICATION LAYOUT ---
        layout() {
            const tabs = [
                { id: 'dashboard', icon: 'layout-dashboard', label: 'Overview' },
                { id: 'inventory', icon: 'package', label: 'Inventory' },
                { id: 'customers', icon: 'users', label: 'Customers' },
                { id: 'suppliers', icon: 'truck', label: 'Suppliers' },
                { id: 'accounts', icon: 'wallet', label: 'Financial Ledger' },
                { id: 'profile', icon: 'building', label: 'Enterprise Profile' }
            ];

            const navLinks = tabs.map(tab => `
                <button onclick="app.setTab('${tab.id}')" class="w-full flex items-center gap-3.5 px-6 py-3 transition-all duration-200 text-sm font-medium ${app.state.currentTab === tab.id ? 'bg-brand-600/10 text-brand-400 border-r-4 border-brand-500' : 'hover:bg-slate-800 text-slate-400 hover:text-slate-200 border-r-4 border-transparent'}">
                    <i data-lucide="${tab.icon}" class="w-5 h-5 ${app.state.currentTab === tab.id ? 'text-brand-400' : 'text-slate-500'}"></i> ${tab.label}
                </button>
            `).join('');

            const titleMap = { dashboard: 'System Overview', inventory: 'Inventory Management', customers: 'Customer Database', suppliers: 'Supplier Directory', accounts: 'Financial Ledger', profile: 'Enterprise Profile' };

            return `
            ${app.state.isMobileMenuOpen ? `<div class="fixed inset-0 bg-slate-900/50 z-40 md:hidden backdrop-blur-sm transition-opacity" onclick="app.toggleMobileMenu()"></div>` : ''}
            
            <aside class="${app.state.isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0 fixed md:static inset-y-0 left-0 w-[260px] bg-slate-900 text-slate-300 flex flex-col z-50 transition-transform duration-300 ease-in-out shadow-2xl md:shadow-none">
                <div class="px-6 py-6 flex items-center justify-between border-b border-slate-800 shrink-0">
                    <div class="flex items-center gap-3">
                        <div class="bg-brand-600 p-1.5 rounded text-white"><i data-lucide="hexagon" class="w-5 h-5"></i></div>
                        <span class="text-lg font-bold text-white tracking-tight">Nexus ERP</span>
                    </div>
                    <button class="md:hidden p-1.5 text-slate-400 hover:text-white rounded-md transition-colors" onclick="app.toggleMobileMenu()"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
                
                <nav class="flex-1 py-6 space-y-1 overflow-y-auto">
                    <div class="px-6 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Workspace</div>
                    ${navLinks}
                </nav>

                <div class="p-5 border-t border-slate-800 bg-slate-950/30 shrink-0">
                    <div class="flex items-center gap-3 mb-4 px-1">
                        <div class="w-10 h-10 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center text-white font-bold text-sm shadow-inner shrink-0">
                            ${app.state.user.name.charAt(0).toUpperCase()}
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-semibold text-white leading-tight truncate">${app.state.user.name}</p>
                            <p class="text-[11px] font-medium text-brand-400 capitalize mt-0.5 truncate">${app.state.user.role}</p>
                        </div>
                    </div>
                    <button onclick="app.logout()" class="w-full flex items-center justify-center gap-2 px-4 py-2.5 bg-slate-800 hover:bg-slate-700 text-slate-200 rounded-lg transition duration-200 text-xs font-semibold border border-slate-700">
                        <i data-lucide="log-out" class="w-4 h-4"></i> Sign Out
                    </button>
                </div>
            </aside>

            <main class="flex-1 flex flex-col h-screen overflow-hidden w-full bg-slate-50">
                <header class="glass border-b border-slate-200 px-4 md:px-8 py-4 flex items-center justify-between z-10 shrink-0 sticky top-0">
                    <div class="flex items-center gap-4">
                        <button onclick="app.toggleMobileMenu()" class="md:hidden p-2 rounded-lg bg-white border border-slate-200 shadow-sm text-slate-600 hover:bg-slate-50 transition-colors"><i data-lucide="menu" class="w-5 h-5"></i></button>
                        <h1 class="text-xl font-bold text-slate-900 tracking-tight">${titleMap[app.state.currentTab]}</h1>
                    </div>
                    <div class="hidden sm:flex items-center gap-2 text-[11px] font-bold text-slate-600 bg-white px-3 py-1.5 rounded-full border border-slate-200 shadow-sm">
                        <div class="w-2 h-2 rounded-full bg-emerald-500"></div>
                        <span class="uppercase tracking-wider">System Online</span>
                    </div>
                </header>
                <div class="flex-1 overflow-y-auto p-4 md:p-8">
                    <div class="max-w-[1400px] mx-auto fade-in" id="main-content"></div>
                </div>
            </main>`;
        },

        // --- DASHBOARD VIEW ---
        dashboard() {
            const db = app.state.db;
            let revenue = 0, loss = 0;
            db.transactions.forEach(t => {
                if (t.type === 'revenue') revenue += Number(t.amount);
                if (t.type === 'loss') loss += Number(t.amount);
            });
            
            const totalStock = db.inventory.reduce((acc, item) => acc + Number(item.quantity), 0);
            const invValue = db.inventory.reduce((acc, item) => acc + (Number(item.quantity) * Number(item.price)), 0);
            const lowStock = db.inventory.filter(i => Number(i.quantity) <= Number(i.threshold)).slice(0,4);
            
            const exp = db.transactions.filter(t => t.type === 'loss');
            const expByCat = exp.reduce((acc, t) => { acc[t.category || 'Other'] = (acc[t.category || 'Other'] || 0) + Number(t.amount); return acc; }, {});
            const topExp = Object.entries(expByCat).sort((a,b) => b[1] - a[1]).slice(0,4).map(e => ({ cat: e[0], amt: e[1], pct: loss ? (e[1]/loss)*100 : 0 }));
            
            const topCust = [...db.customers].sort((a, b) => Number(b.totalSpent) - Number(a.totalSpent)).slice(0, 4);
            const recentTx = db.transactions.slice(-5).reverse();

            const statCard = (title, val, bgClass, textClass, icon, subtitle) => `
                <div class="p-6 rounded-2xl ${bgClass} shadow-md relative overflow-hidden group hover:shadow-lg transition-all duration-300 transform hover:-translate-y-1">
                    <div class="absolute -right-8 -top-8 w-32 h-32 bg-white/10 rounded-full blur-2xl group-hover:scale-125 transition-transform duration-700"></div>
                    <div class="flex justify-between items-start mb-4 relative z-10">
                        <div>
                            <p class="text-[11px] font-bold ${textClass} opacity-80 mb-1.5 uppercase tracking-widest">${title}</p>
                            <h4 class="text-3xl font-black ${textClass} tracking-tight">${app.formatCurrency(val)}</h4>
                        </div>
                        <div class="p-3 rounded-xl bg-white/20 backdrop-blur-md shadow-sm">
                            <i data-lucide="${icon}" class="w-6 h-6 ${textClass}"></i>
                        </div>
                    </div>
                    ${subtitle ? `<div class="mt-4 inline-block px-3 py-1 bg-white/20 rounded-lg text-xs font-semibold ${textClass} backdrop-blur-md relative z-10">${subtitle}</div>` : ''}
                </div>`;

            return `
            <div class="space-y-8 fade-in relative">
                <!-- Top Stats Grid -->
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                    ${statCard('Net Profit', revenue - loss, 'bg-gradient-to-br from-slate-800 to-slate-950', 'text-white', 'wallet')}
                    ${statCard('Total Revenue', revenue, 'bg-gradient-to-br from-emerald-500 to-emerald-700', 'text-white', 'trending-up')}
                    ${statCard('Total Expenses', loss, 'bg-gradient-to-br from-rose-500 to-rose-700', 'text-white', 'trending-down')}
                    ${statCard('Inventory Value', invValue, 'bg-gradient-to-br from-brand-500 to-indigo-600', 'text-white', 'package', `${totalStock} Active Units`)}
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    <!-- Left Column (2/3 width) -->
                    <div class="lg:col-span-2 space-y-8">
                        
                        <!-- Recent Transactions -->
                        <div class="bg-white rounded-2xl shadow-sm border border-slate-200/60 overflow-hidden">
                            <div class="px-6 py-5 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                                <h3 class="text-sm font-bold text-slate-800 uppercase tracking-widest flex items-center gap-2"><i data-lucide="activity" class="w-4 h-4 text-brand-500"></i> Recent Activity</h3>
                                <button onclick="app.setTab('accounts')" class="text-xs font-bold text-brand-600 hover:text-brand-800 transition">View All</button>
                            </div>
                            <div class="flex flex-col p-2">
                                ${recentTx.length > 0 ? recentTx.map(t => `
                                    <div class="flex items-center justify-between p-4 hover:bg-slate-50 transition-colors rounded-xl group">
                                        <div class="flex items-center gap-4">
                                            <div class="w-12 h-12 rounded-xl flex items-center justify-center shadow-sm ${t.type === 'revenue' ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}">
                                                <i data-lucide="${t.type === 'revenue' ? 'arrow-up-right' : 'arrow-down-right'}" class="w-6 h-6"></i>
                                            </div>
                                            <div>
                                                <p class="font-bold text-slate-900 text-sm group-hover:text-brand-600 transition-colors">${t.description}</p>
                                                <p class="text-[11px] font-medium text-slate-500 mt-1 uppercase tracking-wider">${t.date} &bull; <span class="text-slate-700">${t.category}</span></p>
                                            </div>
                                        </div>
                                        <span class="font-black text-sm ${t.type === 'revenue' ? 'text-emerald-600' : 'text-slate-900'}">
                                            ${t.type === 'revenue' ? '+' : '-'} ${app.formatCurrency(t.amount)}
                                        </span>
                                    </div>
                                `).join('') : '<div class="p-8 text-center text-sm font-medium text-slate-500">No transactions recorded yet.</div>'}
                            </div>
                        </div>

                        <!-- Top Expenses -->
                        <div class="bg-white rounded-2xl shadow-sm border border-slate-200/60 p-6 sm:p-8">
                            <h3 class="text-sm font-bold text-slate-800 uppercase tracking-widest mb-6 flex items-center gap-2"><i data-lucide="pie-chart" class="w-4 h-4 text-rose-500"></i> Expense Distribution</h3>
                            <div class="space-y-6">
                                ${topExp.length > 0 ? topExp.map(e => `
                                    <div class="group">
                                        <div class="flex justify-between text-sm mb-2.5">
                                            <span class="font-semibold text-slate-700 group-hover:text-brand-600 transition-colors">${e.cat}</span>
                                            <span class="text-slate-900 font-bold">${app.formatCurrency(e.amt)} <span class="text-slate-400 font-medium ml-1">(${e.pct.toFixed(1)}%)</span></span>
                                        </div>
                                        <div class="w-full bg-slate-100 rounded-full h-2.5 overflow-hidden shadow-inner">
                                            <div class="bg-gradient-to-r from-rose-400 to-rose-600 h-full rounded-full transition-all duration-1000 ease-out" style="width: ${e.pct}%"></div>
                                        </div>
                                    </div>
                                `).join('') : '<p class="text-sm font-medium text-slate-500 text-center py-4">No expenses to categorize.</p>'}
                            </div>
                        </div>
                    </div>

                    <!-- Right Column (1/3 width) -->
                    <div class="space-y-8">
                        
                        <!-- Stock Alerts -->
                        <div class="bg-white rounded-2xl shadow-sm border border-slate-200/60 overflow-hidden">
                            <div class="px-6 py-5 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                                <h3 class="text-sm font-bold text-slate-800 uppercase tracking-widest flex items-center gap-2"><i data-lucide="bell" class="w-4 h-4 text-amber-500"></i> Stock Alerts</h3>
                                <span class="bg-amber-100 text-amber-700 text-xs font-bold px-2 py-1 rounded-md">${lowStock.length}</span>
                            </div>
                            <div class="p-4 space-y-3">
                                ${lowStock.length > 0 ? lowStock.map(i => `
                                    <div class="flex justify-between items-center p-3.5 border border-slate-100 rounded-xl bg-white shadow-sm hover:shadow-md transition-shadow">
                                        <div class="min-w-0 pr-3">
                                            <p class="text-sm font-bold text-slate-900 truncate">${i.name}</p>
                                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mt-1">Threshold: ${i.threshold}</p>
                                        </div>
                                        <span class="px-2.5 py-1 rounded-lg text-xs font-bold whitespace-nowrap ${i.quantity == 0 ? 'bg-red-50 text-red-700 border border-red-100' : 'bg-amber-50 text-amber-700 border border-amber-100'}">${i.quantity} Left</span>
                                    </div>
                                `).join('') : `
                                    <div class="text-center py-8">
                                        <div class="w-12 h-12 bg-emerald-50 rounded-full flex items-center justify-center mx-auto mb-3 text-emerald-500"><i data-lucide="check-circle" class="w-6 h-6"></i></div>
                                        <p class="text-sm font-bold text-slate-700">Inventory is fully stocked</p>
                                    </div>
                                `}
                            </div>
                        </div>

                        <!-- Top Clients -->
                        <div class="bg-white rounded-2xl shadow-sm border border-slate-200/60 overflow-hidden">
                            <div class="px-6 py-5 border-b border-slate-100 bg-slate-50/50">
                                <h3 class="text-sm font-bold text-slate-800 uppercase tracking-widest flex items-center gap-2"><i data-lucide="star" class="w-4 h-4 text-brand-500"></i> Top Clients (LTV)</h3>
                            </div>
                            <div class="flex flex-col p-2">
                                ${topCust.length > 0 ? topCust.map(c => `
                                    <div class="p-3 flex items-center justify-between hover:bg-slate-50 transition-colors rounded-xl">
                                        <div class="flex items-center gap-3 w-2/3">
                                            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-brand-100 to-indigo-100 flex items-center justify-center text-brand-700 font-bold text-sm shadow-inner uppercase shrink-0">${c.name.charAt(0)}</div>
                                            <div class="min-w-0">
                                                <p class="text-sm font-bold text-slate-900 truncate">${c.name}</p>
                                                <p class="text-[11px] font-medium text-slate-500 truncate mt-0.5">${c.company}</p>
                                            </div>
                                        </div>
                                        <div class="text-right shrink-0">
                                            <p class="text-xs font-black text-slate-900">${app.formatCurrency(c.totalSpent)}</p>
                                            <p class="text-[10px] font-bold text-slate-400 uppercase mt-0.5">Value</p>
                                        </div>
                                    </div>
                                `).join('') : '<div class="p-6 text-center text-sm font-medium text-slate-500">No client data.</div>'}
                            </div>
                        </div>
                    </div>
                </div>
            </div>`;
        },

        // --- INVENTORY VIEW ---
        inventory() {
            const canAdd = app.hasPermission('inventory', 'add');
            const canEdit = app.hasPermission('inventory', 'edit');
            const canDelete = app.hasPermission('inventory', 'delete');
            const canSell = app.hasPermission('inventory', 'sell');

            const rows = app.state.db.inventory.map(i => {
                let statusClass = 'bg-emerald-100 text-emerald-800'; let statusText = 'In Stock';
                let sellDisabled = '';
                if (i.quantity == 0) { 
                    statusClass = 'bg-rose-100 text-rose-800'; 
                    statusText = 'Out of Stock'; 
                    sellDisabled = 'disabled opacity-50 cursor-not-allowed';
                }
                else if (i.quantity <= i.threshold) { statusClass = 'bg-amber-100 text-amber-800'; statusText = 'Low Stock'; }

                return `
                <tr class="hover:bg-slate-50/80 transition-colors border-b border-slate-100 last:border-0 item-row group" data-search="${i.name.toLowerCase()} ${i.sku.toLowerCase()}">
                    <td class="px-6 py-4"><p class="font-bold text-slate-900 group-hover:text-brand-600 transition-colors">${i.name}</p><p class="font-mono text-xs font-semibold text-slate-500 mt-1">${i.sku}</p></td>
                    <td class="px-6 py-4"><p class="text-sm font-semibold text-slate-700">${i.category}</p><p class="text-xs font-medium text-slate-500 mt-1">${i.supplier}</p></td>
                    <td class="px-6 py-4"><div class="flex flex-col items-start gap-1.5"><span class="px-2.5 py-0.5 rounded-lg text-[11px] font-bold uppercase tracking-wide ${statusClass}">${statusText}</span><span class="text-slate-500 font-medium text-xs mt-0.5">Qty: ${i.quantity} <span class="text-slate-300 mx-1">|</span> Min: ${i.threshold}</span></div></td>
                    <td class="px-6 py-4 text-slate-900 font-black text-sm">${app.formatCurrency(i.price)}</td>
                    <td class="px-6 py-4 text-right space-x-1 whitespace-nowrap opacity-100 sm:opacity-0 sm:group-hover:opacity-100 transition-opacity">
                        ${canSell ? `<button onclick="app.actions.openSellModal(${i.id})" class="text-emerald-600 bg-emerald-50 hover:bg-emerald-100 px-3 py-1.5 rounded-lg font-semibold text-xs transition shadow-sm ${sellDisabled}" ${sellDisabled}>Sell</button>` : ''}
                        ${canEdit ? `<button onclick="app.actions.openInventoryModal(${i.id})" class="text-brand-600 bg-brand-50 hover:bg-brand-100 px-3 py-1.5 rounded-lg font-semibold text-xs transition shadow-sm">Edit</button>` : ''}
                        ${canDelete ? `<button onclick="app.actions.deleteInventory(${i.id})" class="text-rose-600 bg-rose-50 hover:bg-rose-100 px-3 py-1.5 rounded-lg font-semibold text-xs transition shadow-sm">Delete</button>` : ''}
                    </td>
                </tr>`;
            }).join('');

            return `
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200/60 flex flex-col h-full overflow-hidden fade-in">
                <div class="p-6 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white">
                    <div class="relative w-full sm:w-80">
                        <i data-lucide="search" class="w-4 h-4 text-slate-400 absolute left-3.5 top-1/2 transform -translate-y-1/2"></i>
                        <input type="text" placeholder="Search by name or SKU..." onkeyup="app.actions.filterTable(this.value)" class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200/80 rounded-xl focus:bg-white focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition text-sm shadow-sm" />
                    </div>
                    ${canAdd ? `<button onclick="app.actions.openInventoryModal()" class="bg-brand-600 hover:bg-brand-700 text-white px-5 py-2.5 rounded-xl flex items-center gap-2 font-bold transition text-sm shadow-md whitespace-nowrap"><i data-lucide="plus" class="w-4 h-4"></i> Add Product</button>` : ''}
                </div>
                <div class="overflow-x-auto flex-1">
                    <table class="w-full text-left border-collapse text-sm">
                        <thead>
                            <tr class="bg-slate-50/50 border-b border-slate-100">
                                <th class="px-6 py-4 font-bold text-slate-500 uppercase tracking-widest text-[11px]">Product Details</th>
                                <th class="px-6 py-4 font-bold text-slate-500 uppercase tracking-widest text-[11px]">Category / Vendor</th>
                                <th class="px-6 py-4 font-bold text-slate-500 uppercase tracking-widest text-[11px]">Stock Level</th>
                                <th class="px-6 py-4 font-bold text-slate-500 uppercase tracking-widest text-[11px]">Unit Price</th>
                                <th class="px-6 py-4 font-bold text-slate-500 uppercase tracking-widest text-[11px] text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody>${rows || `<tr><td colspan="5" class="p-16 text-center text-slate-500 font-medium bg-slate-50/30">No products found in inventory.</td></tr>`}</tbody>
                    </table>
                </div>
            </div>`;
        },

        // --- CUSTOMERS VIEW ---
        customers() {
            const canAdd = app.hasPermission('customers', 'add');
            const canEdit = app.hasPermission('customers', 'edit');
            const canDelete = app.hasPermission('customers', 'delete');

            const rows = app.state.db.customers.map(c => {
                let statusClass = c.status === 'Active' ? 'bg-emerald-100 text-emerald-800' : 'bg-slate-100 text-slate-600';

                return `
                <tr class="hover:bg-slate-50/80 transition-colors border-b border-slate-100 last:border-0 item-row group" data-search="${c.name.toLowerCase()} ${c.company.toLowerCase()}">
                    <td class="px-6 py-4">
                        <div class="flex items-center gap-3.5">
                            <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-brand-100 to-indigo-100 text-brand-700 flex items-center justify-center font-bold text-sm uppercase shrink-0 shadow-inner">${c.name.charAt(0)}</div>
                            <div>
                                <p class="font-bold text-slate-900 group-hover:text-brand-600 transition-colors">${c.name}</p>
                                <p class="text-[11px] font-bold text-slate-500 mt-0.5 uppercase tracking-wide">${c.company}</p>
                            </div>
                        </div>
                    </td>
                    <td class="px-6 py-4">
                        <p class="text-sm font-semibold text-slate-700 flex items-center gap-2"><div class="p-1.5 rounded-lg bg-slate-50 border border-slate-100 text-slate-400 inline-block mr-2"><i data-lucide="mail" class="w-3 h-3"></i></div> ${c.email}</p>
                        <p class="text-xs font-medium text-slate-500 mt-2 flex items-center gap-2"><div class="p-1.5 rounded-lg bg-slate-50 border border-slate-100 text-slate-400 inline-block mr-2"><i data-lucide="phone" class="w-3 h-3"></i></div> ${c.phone}</p>
                    </td>
                    <td class="px-6 py-4"><span class="px-2.5 py-1 rounded-lg text-[11px] font-bold uppercase tracking-wide ${statusClass}">${c.status}</span></td>
                    <td class="px-6 py-4 text-slate-900 font-black text-sm">${app.formatCurrency(c.totalSpent)}</td>
                    <td class="px-6 py-4 text-right space-x-1 whitespace-nowrap opacity-100 sm:opacity-0 sm:group-hover:opacity-100 transition-opacity">
                        ${canEdit ? `<button onclick="app.actions.openCustomerModal(${c.id})" class="text-brand-600 bg-brand-50 hover:bg-brand-100 px-3 py-1.5 rounded-lg font-semibold text-xs transition shadow-sm">Edit</button>` : ''}
                        ${canDelete ? `<button onclick="app.actions.deleteCustomer(${c.id})" class="text-rose-600 bg-rose-50 hover:bg-rose-100 px-3 py-1.5 rounded-lg font-semibold text-xs transition shadow-sm">Delete</button>` : ''}
                    </td>
                </tr>`;
            }).join('');

            return `
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200/60 flex flex-col h-full overflow-hidden fade-in">
                <div class="p-6 border-b border-slate-100 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-white">
                    <div class="relative w-full sm:w-80">
                        <i data-lucide="search" class="w-4 h-4 text-slate-400 absolute left-3.5 top-1/2 transform -translate-y-1/2"></i>
                        <input type="text" placeholder="Search clients or companies..." onkeyup="app.actions.filterTable(this.value)" class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200/80 rounded-xl focus:bg-white focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition text-sm shadow-sm" />
                    </div>
                    ${canAdd ? `<button onclick="app.actions.openCustomerModal()" class="bg-brand-600 hover:bg-brand-700 text-white px-5 py-2.5 rounded-xl flex items-center gap-2 font-bold transition text-sm shadow-md whitespace-nowrap"><i data-lucide="user-plus" class="w-4 h-4"></i> Add Client</button>` : ''}
                </div>
                <div class="overflow-x-auto flex-1">
                    <table class="w-full text-left border-collapse text-sm">
                        <thead>
                            <tr class="bg-slate-50/50 border-b border-slate-100">
                                <th class="px-6 py-4 font-bold text-slate-500 uppercase tracking-widest text-[11px]">Client Details</th>
                                <th class="px-6 py-4 font-bold text-slate-500 uppercase tracking-widest text-[11px]">Contact Info</th>
                                <th class="px-6 py-4 font-bold text-slate-500 uppercase tracking-widest text-[11px]">Status</th>

        // --- ACCOUNTS / FINANCIAL LEDGER VIEW ---

                                <p class="text-[11px] font-bold text-white opacity-80 mb-1.5 uppercase tracking-widest">Total Expenses (Outflows)</p>

                        <div class="flex justify-between items-start mb-2 relative z-10">
                            <div>
                                <p class="text-[11px] font-bold text-white opacity-80 mb-1.5 uppercase tracking-widest">Net Profit / Balance</p>
                                <h4 class="text-3xl font-black text-white tracking-tight">${app.formatCurrency(net)}</h4>
                            </div>
                            <div class="p-3 rounded-xl bg-white/20 backdrop-blur-md shadow-sm"><i data-lucide="wallet" class="w-6 h-6 text-white"></i></div>

                <div class="bg-white rounded-2xl shadow-sm border border-slate-200/60 flex flex-col overflow-hidden">

                        <div class="relative w-full sm:w-80">
                            <i data-lucide="search" class="w-4 h-4 text-slate-400 absolute left-3.5 top-1/2 transform -translate-y-1/2"></i>
                            <input type="text" placeholder="Search transactions..." onkeyup="app.actions.filterTable(this.value)" class="w-full pl-10 pr-4 py-2.5 bg-slate-50 border border-slate-200/80 rounded-xl focus:bg-white focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition text-sm shadow-sm" />
                        </div>
                        ${canAdd ? `<button onclick="app.actions.openTransactionModal()" class="bg-brand-600 hover:bg-brand-700 text-white px-5 py-2.5 rounded-xl flex items-center gap-2 font-bold transition text-sm shadow-md whitespace-nowrap"><i data-lucide="plus" class="w-4 h-4"></i> Add Entry</button>` : ''}
                    </div>
                    <div class="overflow-x-auto flex-1">
                        <table class="w-full text-left border-collapse text-sm">
                            <thead>
                                <tr class="bg-slate-50/50 border-b border-slate-100">
                                    <th class="px-6 py-4 font-bold text-slate-500 uppercase tracking-widest text-[11px]">Date</th>
                                    <th class="px-6 py-4 font-bold text-slate-500 uppercase tracking-widest text-[11px]">Description</th>
                                    <th class="px-6 py-4 font-bold text-slate-500 uppercase tracking-widest text-[11px]">Category / Method</th>
                                    <th class="px-6 py-4 font-bold text-slate-500 uppercase tracking-widest text-[11px] text-right">Amount</th>

                            </thead>

        // --- PROFILE VIEW ---
        profile() { 
            const data = app.state.db.profile;
            
            const profileItem = (label, val, icon) => `
                <div class="flex items-start gap-4">

                        <h2 class="text-xs font-bold text-slate-800 uppercase tracking-widest">Enterprise Profile</h2>
                        ${app.hasPermission('profile', 'edit') ? `<button onclick="app.actions.openProfileModal()" class="text-brand-600 bg-brand-50 hover:bg-brand-100 px-4 py-2 rounded-lg font-semibold text-sm transition flex items-center gap-1.5"><i data-lucide="edit-2" class="w-4 h-4"></i> Edit Profile</button>` : ''}

                        </div>
                        
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-y-8 gap-x-12 border-t border-slate-100 pt-10">
                            ${profileItem('Email Address', data.email, 'mail')}
                            ${profileItem('Phone Number', data.phone, 'phone')}
                            ${profileItem('Website', data.website, 'globe')}
                            ${profileItem('Industry', data.industry, 'briefcase')}
                            ${profileItem('Company Size', data.size ? data.size + ' Employees' : null, 'users')}
                            ${profileItem('Base Currency', data.currency, 'banknote')}
                            ${profileItem('Tax ID / BIN', `<span class="font-mono">${data.taxId || '--'}</span>`, 'file-text')}

        }
    },

    /**
     * ==========================================
     * ACTIONS / EVENT HANDLERS
     * ==========================================
     */
    actions: {
        login(e) {
            e.preventDefault();
            const fd = new FormData(e.target);
            const user = INITIAL_USERS.find(u => u.username === fd.get('username') && u.password === fd.get('password'));
            if (user) {
                if (['admin', 'editor', 'mod'].includes(user.username)) {
                    app.state.db = JSON.parse(JSON.stringify(INITIAL_DB)); // Load mock data for test users
                }
                app.state.authError = '';
                app.state.user = user;
                app.state.currentTab = 'dashboard';
                app.render();
            } else {
                app.state.authError = 'Authentication failed. Please check credentials.';
                app.render();
            }
        },

        register(e) {
            e.preventDefault();
            const fd = new FormData(e.target);
            const u = fd.get('username');
            
            if (INITIAL_USERS.some(usr => usr.username === u)) {
                app.state.authError = 'User ID already exists.';
                app.render();
                return;
            }
            
            const fullName = `${fd.get('firstName')} ${fd.get('lastName')}`;
            const email = fd.get('email');

            const newUser = { id: Date.now(), username: u, password: fd.get('password'), role: 'admin', name: fullName, email: email };
            INITIAL_USERS.push(newUser);
            
            app.state.db = JSON.parse(JSON.stringify(EMPTY_DB)); // Fresh slate
            app.state.db.profile.email = email; // Pre-fill email
            
            app.state.authError = '';
            app.state.user = newUser;
            app.state.currentTab = 'induction';
            app.render();
        },

        completeInduction(e) {
            e.preventDefault();
            const fd = new FormData(e.target);
            app.state.db.profile = {
                ...app.state.db.profile,
                name: fd.get('name'),
                email: fd.get('email'),
                phone: fd.get('phone'),
                industry: fd.get('industry'),
                size: fd.get('size'),
                currency: fd.get('currency'),
                taxId: fd.get('taxId')
            };
            app.state.currentTab = 'dashboard';
            app.render();

            // Launch Onboarding Tour
            app.state.tourStep = 1;
            app.actions.renderTourModal();
        },

        // --- ONBOARDING TOUR ACTIONS ---
        renderTourModal() {
            const step = app.state.tourStep;
            if (step === 0) {
                app.actions.closeModal();
                return;
            }

            const steps = [
                { icon: 'layout-dashboard', title: 'Command Center', desc: 'Get a bird\'s-eye view of your entire enterprise. Track net profit, total revenue, and critical stock alerts all in one place.', color: 'from-brand-500 to-indigo-600' },
                { icon: 'package', title: 'Smart Inventory', desc: 'Add products, set minimum stock thresholds, and process sales. Selling an item automatically deducts stock and updates your financial ledger.', color: 'from-emerald-500 to-teal-600' },
                { icon: 'users', title: 'Directory Hub', desc: 'Manage your business relationships. Track customer Lifetime Value (LTV) and maintain a robust supplier database to keep operations smooth.', color: 'from-amber-500 to-orange-600' },
                { icon: 'wallet', title: 'Automated Financials', desc: 'Your ledger tracks every penny. Product sales are logged automatically, and you can easily record manual expenses to keep your profit margins accurate.', color: 'from-rose-500 to-pink-600' }
            ];

            const current = steps[step - 1];
            const isLast = step === steps.length;
            const isFirst = step === 1;

            const dots = steps.map((_, idx) => `<div class="h-2 rounded-full ${idx + 1 === step ? 'bg-brand-600 w-6' : 'bg-slate-200 w-2'} transition-all duration-300"></div>`).join('');

            const content = `
                <div class="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-[100] p-4 backdrop-blur-sm fade-in">
                    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col md:flex-row slide-up relative">
                        <button onclick="app.actions.endTour()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-700 transition z-10 bg-white/50 backdrop-blur rounded-full p-1"><i data-lucide="x" class="w-5 h-5"></i></button>
                        
                        <div class="w-full md:w-2/5 bg-gradient-to-br ${current.color} p-8 flex items-center justify-center relative overflow-hidden h-48 md:h-auto">
                            <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjIiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz48L3N2Zz4=')] opacity-30"></div>
                            <div class="absolute -right-10 -top-10 w-40 h-40 bg-white/20 rounded-full blur-2xl"></div>
                            <i data-lucide="${current.icon}" class="w-24 h-24 text-white relative z-10 drop-shadow-lg transform transition-transform hover:scale-110 duration-500"></i>
                        </div>
                        
                        <div class="w-full md:w-3/5 p-8 flex flex-col justify-between bg-white min-h-[300px]">
                            <div>
                                <p class="text-[10px] font-bold text-brand-600 uppercase tracking-widest mb-2">Setup Guide &bull; Step ${step} of ${steps.length}</p>
                                <h3 class="text-2xl font-black text-slate-900 mb-3 tracking-tight">${current.title}</h3>
                                <p class="text-sm font-medium text-slate-500 leading-relaxed">${current.desc}</p>
                            </div>
                            
                            <div class="mt-8 pt-6 border-t border-slate-100 flex items-center justify-between">
                                <div class="flex gap-2">
                                    ${dots}
                                </div>
                                <div class="flex gap-2">
                                    ${!isFirst ? `<button onclick="app.actions.prevTourStep()" class="px-4 py-2.5 text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg font-bold transition text-sm">Back</button>` : ''}
                                    <button onclick="${isLast ? 'app.actions.endTour()' : 'app.actions.nextTourStep()'}" class="px-5 py-2.5 ${isLast ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-brand-600 hover:bg-brand-700'} text-white rounded-lg font-bold transition text-sm flex items-center gap-1.5 shadow-md">
                                        ${isLast ? 'Get Started <i data-lucide="check" class="w-4 h-4"></i>' : 'Next <i data-lucide="arrow-right" class="w-4 h-4"></i>'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('modal-root').innerHTML = content;
            lucide.createIcons();
        },

        nextTourStep() {
            app.state.tourStep++;
            app.actions.renderTourModal();
        },

        prevTourStep() {
            app.state.tourStep--;
            app.actions.renderTourModal();
        },

        endTour() {
            app.state.tourStep = 0;
            app.actions.closeModal();
        },

        // --- INVENTORY ACTIONS ---
        openInventoryModal(id = null) {
            const item = id ? app.state.db.inventory.find(i => i.id === id) : { name:'', sku:'', category:'', supplier:'', quantity:'', threshold:'10', price:'' };
            const content = `
                <input type="hidden" name="id" value="${id || ''}" />
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 text-sm">

                    type: 'revenue',
                    amount: sellQty * sellPrice,
                    description: `Sale: ${item.name} (x${sellQty})`,

                    method: method,
                    date: date
                });
            }

            app.actions.closeModal();
            app.render();
        },

                    </div>
                    <div>
                        <h4 class="font-bold text-slate-900 text-base mb-1">4. Sharing of Information</h4>
                        <p>We do not share, sell, or rent your personal or enterprise information to third parties except as strictly necessary to provide our core services or as mandated by law.</p>
                    </div>
                </div>
            `;
            
            const title = type === 'tos' ? 'Terms of Service' : 'Privacy Policy';
            
            document.getElementById('modal-root').innerHTML = `
                <div class="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-[100] p-4 backdrop-blur-sm fade-in">
                    <div class="bg-white rounded-xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[85vh] slide-up">
                        <div class="px-6 py-5 border-b border-slate-200 bg-white shrink-0 flex justify-between items-center relative">
                            <div class="absolute left-0 top-0 bottom-0 w-1 bg-brand-500"></div>
                            <h3 class="font-bold text-lg text-slate-900 flex items-center gap-2"><i data-lucide="shield-check" class="w-5 h-5 text-brand-500"></i> ${title}</h3>
                            <button type="button" onclick="app.actions.closeModal()" class="text-slate-400 hover:text-slate-700 transition bg-slate-100 hover:bg-slate-200 p-1.5 rounded-lg"><i data-lucide="x" class="w-5 h-5"></i></button>
                        </div>
                        <div class="p-6 sm:p-8 overflow-y-auto flex-1 bg-slate-50/50">
                            ${content}
                        </div>
                        <div class="px-6 py-4 border-t border-slate-200 bg-white shrink-0 flex justify-end">
                            <button type="button" onclick="app.actions.closeModal()" class="px-6 py-2.5 bg-slate-900 hover:bg-slate-800 text-white rounded-lg font-semibold transition text-sm shadow-sm">I Understand & Accept</button>
                        </div>
                    </div>
                </div>`;
            lucide.createIcons();
        },

        showModal(title, content, submitHandler) {
            document.getElementById('modal-root').innerHTML = `
                <div class="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-[100] p-4 backdrop-blur-sm fade-in">
                    <div class="bg-white rounded-xl shadow-2xl w-full max-w-xl overflow-hidden flex flex-col max-h-[90vh] slide-up">
                        <div class="px-6 py-4 border-b border-slate-200 bg-slate-50 shrink-0 flex justify-between items-center">
                            <h3 class="font-bold text-slate-900">${title}</h3>
                            <button type="button" onclick="app.actions.closeModal()" class="text-slate-400 hover:text-slate-700 transition"><i data-lucide="x" class="w-5 h-5"></i></button>
                        </div>
                        <form onsubmit="${submitHandler}(event)" class="flex flex-col overflow-hidden h-full">
                            <div class="p-6 overflow-y-auto flex-1">${content}</div>
                            <div class="px-6 py-4 border-t border-slate-200 bg-slate-50 shrink-0 flex justify-end gap-3">
                                <button type="button" onclick="app.actions.closeModal()" class="px-5 py-2.5 text-slate-700 bg-white border border-slate-300 hover:bg-slate-50 rounded-lg font-semibold transition text-sm shadow-sm">Cancel</button>
                                <button type="submit" class="px-5 py-2.5 bg-brand-600 hover:bg-brand-700 text-white rounded-lg font-semibold transition text-sm shadow-sm">Save Details</button>
                            </div>
                        </form>
                    </div>
                </div>`;
            lucide.createIcons();
        },

        closeModal() {
            document.getElementById('modal-root').innerHTML = '';
        }
    }
};

// Initialize
document.addEventListener('DOMContentLoaded', () => app.init());

</script>
</body>
</html>
