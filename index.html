<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Enterprise ERP</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        slate: {
                            50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8',
                            500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a', 950: '#020617'
                        },
                        brand: {
                            50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa',
                            500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Enterprise Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Smooth Rendering */
        body { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
        
        /* Animations */
        .fade-in { animation: fadeIn 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .slide-up { animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Glassmorphism utility */
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans overflow-hidden selection:bg-brand-100 selection:text-brand-900">

    <!-- Root Container -->
    <div id="app-root" class="h-screen w-full flex"></div>

    <!-- Modal Container -->
    <div id="modal-root"></div>

<script>
/**
 * ==========================================
 * MOCK DATABASE & CONFIGURATION
 * ==========================================
 */
const INITIAL_USERS = [
    { id: 1, username: 'admin', password: 'password', role: 'admin', name: 'System Admin' },
    { id: 2, username: 'editor', password: 'password', role: 'editor', name: 'Content Editor' },
    { id: 3, username: 'mod', password: 'password', role: 'moderator', name: 'Community Mod' }
];

const INITIAL_DB = {
    inventory: [
        { id: 1, name: 'Enterprise Server Blade', sku: 'SRV-001', quantity: 15, threshold: 20, price: 2500, category: 'Hardware', supplier: 'TechCorp Inc.' },
        { id: 2, name: 'Ergonomic Office Chair', sku: 'FURN-102', quantity: 42, threshold: 10, price: 350, category: 'Furniture', supplier: 'OfficePlus' },
        { id: 3, name: '27" 4K Monitor', sku: 'DISP-4K', quantity: 5, threshold: 15, price: 400, category: 'Electronics', supplier: 'TechCorp Inc.' },
        { id: 4, name: 'Cloud Storage 1TB (Annual)', sku: 'SW-CLD-1T', quantity: 999, threshold: 50, price: 120, category: 'Software', supplier: 'CloudNet' },
    ],
    customers: [
        { id: 1, name: 'Acme Corporation', email: 'contact@acme.corp', phone: '+1 (555) 0192', company: 'Acme Corp', address: '123 Acme Way, New York, NY', status: 'Active', totalSpent: 45000 },
        { id: 2, name: 'Globex Industries', email: 'info@globex.com', phone: '+1 (555) 0987', company: 'Globex', address: '404 Industrial Pkwy, Chicago, IL', status: 'Inactive', totalSpent: 12500 },
        { id: 3, name: 'Soylent Corp', email: 'sales@soylent.co', phone: '+1 (555) 1122', company: 'Soylent Corp', address: '99 Green St, San Francisco, CA', status: 'Active', totalSpent: 89000 },
    ],
    transactions: [
        { id: 1, date: '2026-04-15', type: 'revenue', amount: 15000, description: 'Server bulk order (Acme)', category: 'Hardware Sales', method: 'Bank Transfer' },
        { id: 2, date: '2026-04-18', type: 'loss', amount: 2500, description: 'Office supplies & maintenance', category: 'Operational Exp', method: 'bKash' },
        { id: 3, date: '2026-04-20', type: 'revenue', amount: 4500, description: 'Monitor sales', category: 'Electronics Sales', method: 'Nagad' },
        { id: 4, date: '2026-04-21', type: 'loss', amount: 8000, description: 'Payroll and employee benefits', category: 'Payroll', method: 'Bank Transfer' },
    ],
    profile: {
        name: 'Nexus Enterprises Ltd.', email: 'contact@nexus-erp.com.bd', phone: '+880 1711-000000',
        address: 'Level 4, Tech Tower, Banani, Dhaka-1213, Bangladesh', website: 'www.nexus-erp.com.bd', taxId: 'BIN-000123456789', established: '2020'
    }
};

const EMPTY_DB = {
    inventory: [], customers: [], transactions: [],
    profile: { name: '', email: '', phone: '', address: '', website: '', taxId: '', established: new Date().getFullYear().toString() }
};

const PERMISSIONS = {
    admin: { inventory: ['add', 'edit', 'delete'], customers: ['add', 'edit', 'delete'], accounts: ['add', 'delete'], profile: ['edit'] },
    editor: { inventory: ['add', 'edit'], customers: ['add', 'edit'], accounts: ['add'], profile: [] },
    moderator: { inventory: [], customers: ['add'], accounts: [], profile: [] }
};

/**
 * ==========================================
 * APPLICATION STATE & CORE LOGIC
 * ==========================================
 */
const app = {
    state: {
        user: null,
        db: JSON.parse(JSON.stringify(INITIAL_DB)),
        currentTab: 'auth', // auth, induction, dashboard, inventory, customers, accounts, profile
        authMode: 'login', // login, register
        isMobileMenuOpen: false,
        authError: ''
    },

    init() {
        this.render();
    },

    hasPermission(resource, action) {
        if (!this.state.user) return false;
        return PERMISSIONS[this.state.user.role]?.[resource]?.includes(action) || false;
    },

    formatCurrency(amount) {
        return '৳' + Number(amount).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    },

    setTab(tab) {
        this.state.currentTab = tab;
        this.state.isMobileMenuOpen = false;
        this.render();
    },

    toggleMobileMenu() {
        this.state.isMobileMenuOpen = !this.state.isMobileMenuOpen;
        this.render();
    },

    logout() {
        this.state.user = null;
        this.state.currentTab = 'auth';
        this.render();
    },

    /**
     * ==========================================
     * RENDERING ENGINE
     * ==========================================
     */
    render() {
        const root = document.getElementById('app-root');
        
        if (!this.state.user) {
            root.innerHTML = this.views.auth();
        } else if (this.state.currentTab === 'induction') {
            root.innerHTML = this.views.induction();
        } else {
            root.innerHTML = this.views.layout();
            const mainContent = document.getElementById('main-content');
            if (this.views[this.state.currentTab]) {
                mainContent.innerHTML = this.views[this.state.currentTab]();
            }
        }
        lucide.createIcons();
    },

    /**
     * ==========================================
     * VIEWS
     * ==========================================
     */
    views: {
        // --- AUTHENTICATION VIEW ---
        auth() {
            const isLogin = app.state.authMode === 'login';
            
            const loginForm = `
                <form onsubmit="app.actions.login(event)" class="space-y-4 mt-8">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">User ID</label>
                        <input name="username" type="text" required class="w-full p-3 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition text-sm shadow-sm" placeholder="e.g. admin" />
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
                        <input name="password" type="password" required class="w-full p-3 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition text-sm shadow-sm" placeholder="••••••••" />
                    </div>
                    <button type="submit" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3 rounded-lg transition duration-200 text-sm mt-4 shadow-sm">
                        Sign In to Workspace
                    </button>
                </form>
            `;

            const registerForm = `
                <form onsubmit="app.actions.register(event)" class="space-y-4 mt-8">
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Full Name</label>
                        <input name="fullname" type="text" required class="w-full p-3 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition text-sm shadow-sm" placeholder="e.g. Jane Doe" />
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">User ID</label>
                        <input name="username" type="text" required class="w-full p-3 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition text-sm shadow-sm" placeholder="e.g. janedoe" />
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
                        <input name="password" type="password" required class="w-full p-3 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition text-sm shadow-sm" placeholder="••••••••" />
                    </div>
                    <button type="submit" class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3 rounded-lg transition duration-200 text-sm mt-4 shadow-sm">
                        Create Account & Start Fresh
                    </button>
                </form>
            `;

            return `
            <div class="min-h-screen flex w-full bg-slate-50 fade-in">
                <!-- Left Panel (Branding) -->
                <div class="hidden lg:flex w-[45%] bg-slate-900 p-12 flex-col justify-between relative overflow-hidden text-white">
                    <div class="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMjAiIGhlaWdodD0iMjAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGNpcmNsZSBjeD0iMiIgY3k9IjIiIHI9IjIiIGZpbGw9InJnYmEoMjU1LDI1NSwyNTUsMC4wNSkiLz48L3N2Zz4=')] opacity-50"></div>
                    <div class="absolute top-[-20%] left-[-10%] w-96 h-96 bg-brand-500/20 rounded-full blur-3xl"></div>
                    
                    <div class="relative z-10">
                        <div class="flex items-center gap-3 mb-16">
                            <div class="bg-brand-600 p-2 rounded-lg shadow-md"><i data-lucide="layout-dashboard" class="w-6 h-6"></i></div>
                            <span class="text-2xl font-bold tracking-tight">Nexus ERP</span>
                        </div>
                        <h1 class="text-4xl font-extrabold leading-tight mb-6">The professional standard for enterprise management.</h1>
                        <p class="text-slate-400 text-lg leading-relaxed max-w-md">Seamlessly integrate your inventory, financials, and customer relations into one unified, secure platform.</p>
                    </div>
                    
                    <div class="relative z-10 text-sm text-slate-500 font-medium">
                        &copy; ${new Date().getFullYear()} Nexus Enterprises Ltd. All rights reserved.
                    </div>
                </div>

                <!-- Right Panel (Form) -->
                <div class="w-full lg:w-[55%] flex flex-col justify-center items-center p-8 sm:p-12 bg-white relative">
                    <div class="w-full max-w-md slide-up">
                        <div class="flex lg:hidden items-center gap-3 mb-12 justify-center">
                            <div class="bg-brand-600 p-2 rounded-lg shadow-md"><i data-lucide="layout-dashboard" class="w-6 h-6 text-white"></i></div>
                            <span class="text-2xl font-bold tracking-tight text-slate-900">Nexus ERP</span>
                        </div>

                        <div class="text-center lg:text-left mb-8">
                            <h2 class="text-3xl font-bold text-slate-900 mb-2">${isLogin ? 'Welcome back' : 'Create an Account'}</h2>
                            <p class="text-slate-500 font-medium text-sm">${isLogin ? 'Enter your credentials to access your workspace.' : 'Initialize a fresh enterprise environment.'}</p>
                        </div>

                        ${app.state.authError ? `
                        <div class="bg-red-50 border border-red-200 text-red-700 p-3.5 text-sm flex items-start gap-3 rounded-lg mb-6">
                            <i data-lucide="alert-circle" class="w-5 h-5 shrink-0 mt-0.5"></i> <p class="font-medium">${app.state.authError}</p>
                        </div>` : ''}

                        ${isLogin ? loginForm : registerForm}

                        <p class="mt-8 text-center text-sm font-medium text-slate-500">
                            ${isLogin ? "Don't have an account?" : "Already have an account?"} 
                            <button onclick="app.state.authMode = '${isLogin ? 'register' : 'login'}'; app.state.authError = ''; app.render();" class="text-brand-600 font-semibold hover:text-brand-700 transition ml-1">
                                ${isLogin ? 'Register now' : 'Sign in instead'}
                            </button>
                        </p>

                        ${isLogin ? `
                        <div class="mt-10 pt-8 border-t border-slate-200">
                            <p class="text-xs font-bold text-slate-400 uppercase tracking-widest text-center mb-4">Demo Credentials</p>
                            <div class="space-y-2">
                                <div class="flex justify-between items-center p-3 border border-slate-200 rounded-lg bg-slate-50">
                                    <span class="font-mono text-xs font-semibold text-slate-700">admin / password</span>
                                    <span class="text-[10px] font-bold uppercase tracking-wide text-brand-700 bg-brand-100 px-2 py-0.5 rounded">Admin</span>
                                </div>
                                <div class="flex justify-between items-center p-3 border border-slate-200 rounded-lg bg-slate-50">
                                    <span class="font-mono text-xs font-semibold text-slate-700">editor / password</span>
                                    <span class="text-[10px] font-bold uppercase tracking-wide text-emerald-700 bg-emerald-100 px-2 py-0.5 rounded">Editor</span>
                                </div>
                            </div>
                        </div>` : ''}
                    </div>
                </div>
            </div>`;
        },

        // --- INDUCTION (ONBOARDING) VIEW ---
        induction() {
            return `
            <div class="min-h-screen flex w-full bg-slate-50 items-center justify-center p-4 fade-in">
                <div class="max-w-2xl w-full bg-white rounded-2xl shadow-xl border border-slate-200 p-8 sm:p-12 slide-up">
                    <div class="text-center mb-10">
                        <div class="w-16 h-16 bg-brand-100 text-brand-600 rounded-2xl flex items-center justify-center mx-auto mb-6">
                            <i data-lucide="building" class="w-8 h-8"></i>
                        </div>
                        <h1 class="text-3xl font-bold text-slate-900 mb-3">Welcome, ${app.state.user.name.split(' ')[0]}!</h1>
                        <p class="text-slate-500 font-medium">Let's set up your new enterprise workspace. Please provide your company's basic information to generate your clean database.</p>
                    </div>

                    <form onsubmit="app.actions.completeInduction(event)" class="space-y-6">
                        <div>
                            <label class="block text-sm font-semibold text-slate-700 mb-1.5">Company Legal Name <span class="text-red-500">*</span></label>
                            <input name="name" type="text" required class="w-full p-3 bg-slate-50 border border-slate-300 rounded-lg focus:bg-white focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition text-sm" placeholder="e.g. Acme Corporation" />
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1.5">Business Email</label>
                                <input name="email" type="email" class="w-full p-3 bg-slate-50 border border-slate-300 rounded-lg focus:bg-white focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition text-sm" placeholder="admin@acme.corp" />
                            </div>
                            <div>
                                <label class="block text-sm font-semibold text-slate-700 mb-1.5">Default Currency</label>
                                <select disabled class="w-full p-3 bg-slate-100 border border-slate-300 rounded-lg outline-none text-sm text-slate-500 font-medium">
                                    <option>BDT (৳)</option>
                                </select>
                            </div>
                        </div>
                        <div class="pt-4 mt-8 border-t border-slate-100">
                            <button type="submit" class="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3.5 rounded-lg transition duration-200 text-sm shadow-md flex items-center justify-center gap-2">
                                Initialize Workspace <i data-lucide="arrow-right" class="w-4 h-4"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>`;
        },

        // --- MAIN APPLICATION LAYOUT ---
        layout() {
            const tabs = [
                { id: 'dashboard', icon: 'layout-dashboard', label: 'Overview' },
                { id: 'inventory', icon: 'package', label: 'Inventory' },
                { id: 'customers', icon: 'users', label: 'Customers' },
                { id: 'accounts', icon: 'wallet', label: 'Ledger' },
                { id: 'profile', icon: 'building', label: 'Profile' }
            ];

            const navLinks = tabs.map(tab => `
                <button onclick="app.setTab('${tab.id}')" class="w-full flex items-center gap-3.5 px-6 py-3 transition-all duration-200 text-sm font-medium ${app.state.currentTab === tab.id ? 'bg-brand-600/10 text-brand-400 border-r-4 border-brand-500' : 'hover:bg-slate-800 text-slate-400 hover:text-slate-200 border-r-4 border-transparent'}">
                    <i data-lucide="${tab.icon}" class="w-5 h-5 ${app.state.currentTab === tab.id ? 'text-brand-400' : 'text-slate-500'}"></i> ${tab.label}
                </button>
            `).join('');

            const titleMap = { dashboard: 'System Overview', inventory: 'Inventory Management', customers: 'Customer Database', accounts: 'Financial Ledger', profile: 'Company Profile' };

            return `
            ${app.state.isMobileMenuOpen ? `<div class="fixed inset-0 bg-slate-900/50 z-40 md:hidden backdrop-blur-sm transition-opacity" onclick="app.toggleMobileMenu()"></div>` : ''}
            
            <aside class="${app.state.isMobileMenuOpen ? 'translate-x-0' : '-translate-x-full'} md:translate-x-0 fixed md:static inset-y-0 left-0 w-[260px] bg-slate-900 text-slate-300 flex flex-col z-50 transition-transform duration-300 ease-in-out shadow-2xl md:shadow-none">
                <div class="px-6 py-6 flex items-center justify-between border-b border-slate-800 shrink-0">
                    <div class="flex items-center gap-3">
                        <div class="bg-brand-600 p-1.5 rounded text-white"><i data-lucide="hexagon" class="w-5 h-5"></i></div>
                        <span class="text-lg font-bold text-white tracking-tight">Nexus ERP</span>
                    </div>
                    <button class="md:hidden p-1.5 text-slate-400 hover:text-white rounded-md transition-colors" onclick="app.toggleMobileMenu()"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
                
                <nav class="flex-1 py-6 space-y-1 overflow-y-auto">
                    <div class="px-6 text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-4">Workspace</div>
                    ${navLinks}
                </nav>

                <div class="p-5 border-t border-slate-800 bg-slate-950/30 shrink-0">
                    <div class="flex items-center gap-3 mb-4 px-1">
                        <div class="w-10 h-10 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center text-white font-bold text-sm shadow-inner shrink-0">
                            ${app.state.user.name.charAt(0).toUpperCase()}
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-semibold text-white leading-tight truncate">${app.state.user.name}</p>
                            <p class="text-[11px] font-medium text-brand-400 capitalize mt-0.5 truncate">${app.state.user.role}</p>
                        </div>
                    </div>
                    <button onclick="app.logout()" class="w-full flex items-center justify-center gap-2 px-4 py-2.5 bg-slate-800 hover:bg-slate-700 text-slate-200 rounded-lg transition duration-200 text-xs font-semibold border border-slate-700">
                        <i data-lucide="log-out" class="w-4 h-4"></i> Sign Out
                    </button>
                </div>
            </aside>

            <main class="flex-1 flex flex-col h-screen overflow-hidden w-full bg-slate-50">
                <header class="glass border-b border-slate-200 px-4 md:px-8 py-4 flex items-center justify-between z-10 shrink-0 sticky top-0">
                    <div class="flex items-center gap-4">
                        <button onclick="app.toggleMobileMenu()" class="md:hidden p-2 rounded-lg bg-white border border-slate-200 shadow-sm text-slate-600 hover:bg-slate-50 transition-colors"><i data-lucide="menu" class="w-5 h-5"></i></button>
                        <h1 class="text-xl font-bold text-slate-900 tracking-tight">${titleMap[app.state.currentTab]}</h1>
                    </div>
                    <div class="hidden sm:flex items-center gap-2 text-[11px] font-bold text-slate-600 bg-white px-3 py-1.5 rounded-full border border-slate-200 shadow-sm">
                        <div class="w-2 h-2 rounded-full bg-emerald-500"></div>
                        <span class="uppercase tracking-wider">System Online</span>
                    </div>
                </header>
                <div class="flex-1 overflow-y-auto p-4 md:p-8">
                    <div class="max-w-[1400px] mx-auto fade-in" id="main-content"></div>
                </div>
            </main>`;
        },

        // --- DASHBOARD VIEW ---
        dashboard() {
            const db = app.state.db;
            let revenue = 0, loss = 0;
            db.transactions.forEach(t => {
                if (t.type === 'revenue') revenue += Number(t.amount);
                if (t.type === 'loss') loss += Number(t.amount);
            });
            
            const totalStock = db.inventory.reduce((acc, item) => acc + Number(item.quantity), 0);
            const invValue = db.inventory.reduce((acc, item) => acc + (Number(item.quantity) * Number(item.price)), 0);
            const lowStock = db.inventory.filter(i => Number(i.quantity) <= Number(i.threshold)).slice(0,4);
            
            const exp = db.transactions.filter(t => t.type === 'loss');
            const expByCat = exp.reduce((acc, t) => { acc[t.category || 'Other'] = (acc[t.category || 'Other'] || 0) + Number(t.amount); return acc; }, {});
            const topExp = Object.entries(expByCat).sort((a,b) => b[1] - a[1]).slice(0,4).map(e => ({ cat: e[0], amt: e[1], pct: loss ? (e[1]/loss)*100 : 0 }));
            
            const topCust = [...db.customers].sort((a, b) => Number(b.totalSpent) - Number(a.totalSpent)).slice(0, 4);
            const recentTx = db.transactions.slice(-5).reverse();

            const statCard = (title, val, colorClass, subtitle) => `
                <div class="p-6 rounded-xl border border-slate-200 bg-white shadow-sm flex flex-col justify-between relative overflow-hidden group">
                    <div class="absolute left-0 top-0 bottom-0 w-1 ${colorClass}"></div>
                    <div>
                        <p class="text-xs font-bold text-slate-500 mb-1 uppercase tracking-wider pl-2">${title}</p>
                        <h4 class="text-3xl font-extrabold text-slate-900 tracking-tight pl-2">${app.formatCurrency(val)}</h4>
                    </div>
                    ${subtitle ? `<div class="mt-4 pl-2 text-xs font-semibold text-slate-500">${subtitle}</div>` : ''}
                </div>`;

            return `
            <div class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
                    ${statCard('Net Balance', revenue - loss, 'bg-slate-900')}
                    ${statCard('Total Revenue', revenue, 'bg-emerald-500')}
                    ${statCard('Total Expenses', loss, 'bg-rose-500')}
                    ${statCard('Inventory Value', invValue, 'bg-blue-500', `${totalStock} total units in stock`)}
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 space-y-6">
                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <div class="px-6 py-4 border-b border-slate-100 bg-slate-50 flex items-center justify-between">
                                <h3 class="text-xs font-bold text-slate-700 uppercase tracking-widest">Recent Transactions</h3>
                            </div>
                            <div class="flex flex-col">
                                ${recentTx.length > 0 ? recentTx.map(t => `
                                    <div class="flex items-center justify-between p-4 hover:bg-slate-50 transition-colors border-b border-slate-100 last:border-0">
                                        <div class="flex items-center gap-4">
                                            <div class="w-10 h-10 rounded-lg flex items-center justify-center ${t.type === 'revenue' ? 'bg-emerald-50 text-emerald-600' : 'bg-slate-100 text-slate-600'}">
                                                <i data-lucide="${t.type === 'revenue' ? 'arrow-up-right' : 'arrow-down-right'}" class="w-5 h-5"></i>
                                            </div>
                                            <div>
                                                <p class="font-semibold text-slate-900 text-sm">${t.description}</p>
                                                <p class="text-xs font-medium text-slate-500 mt-0.5">${t.date} &bull; ${t.category}</p>
                                            </div>
                                        </div>
                                        <span class="font-bold text-sm ${t.type === 'revenue' ? 'text-emerald-600' : 'text-slate-900'}">
                                            ${t.type === 'revenue' ? '+' : '-'} ${app.formatCurrency(t.amount)}
                                        </span>
                                    </div>
                                `).join('') : '<div class="p-8 text-center text-sm font-medium text-slate-500">No transactions recorded yet.</div>'}
                            </div>
                        </div>

                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                            <h3 class="text-xs font-bold text-slate-700 uppercase tracking-widest mb-6">Top Expense Categories</h3>
                            <div class="space-y-6">
                                ${topExp.length > 0 ? topExp.map(e => `
                                    <div>
                                        <div class="flex justify-between text-sm mb-2">
                                            <span class="font-semibold text-slate-700">${e.cat}</span>
                                            <span class="text-slate-900 font-bold">${app.formatCurrency(e.amt)} <span class="text-slate-400 font-medium ml-1">(${e.pct.toFixed(1)}%)</span></span>
                                        </div>
                                        <div class="w-full bg-slate-100 rounded-full h-1.5 overflow-hidden">
                                            <div class="bg-brand-500 h-full rounded-full" style="width: ${e.pct}%"></div>
                                        </div>
                                    </div>
                                `).join('') : '<p class="text-sm font-medium text-slate-500">No expenses to categorize.</p>'}
                            </div>
                        </div>
                    </div>

                    <div class="space-y-6">
                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                            <div class="flex items-center justify-between mb-5">
                                <h3 class="text-xs font-bold text-slate-700 uppercase tracking-widest">Stock Alerts</h3>
                                <div class="bg-amber-100 text-amber-700 p-1.5 rounded flex items-center justify-center"><i data-lucide="alert-triangle" class="w-4 h-4"></i></div>
                            </div>
                            <div class="space-y-3">
                                ${lowStock.length > 0 ? lowStock.map(i => `
                                    <div class="flex justify-between items-center p-3 border border-slate-100 rounded-lg bg-slate-50">
                                        <div>
                                            <p class="text-sm font-bold text-slate-900 truncate max-w-[150px]">${i.name}</p>
                                            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-wider mt-0.5">Min: ${i.threshold}</p>
                                        </div>
                                        <span class="px-2 py-1 rounded text-xs font-bold ${i.quantity == 0 ? 'bg-red-100 text-red-700' : 'bg-amber-100 text-amber-700'}">${i.quantity} Left</span>
                                    </div>
                                `).join('') : `
                                    <div class="text-center py-6 border border-slate-100 rounded-lg bg-slate-50">
                                        <div class="w-10 h-10 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-2 text-emerald-600"><i data-lucide="check" class="w-5 h-5"></i></div>
                                        <p class="text-sm font-bold text-slate-700">Inventory Optimal</p>
                                    </div>
                                `}
                            </div>
                        </div>

                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <div class="px-6 py-4 border-b border-slate-100 bg-slate-50">
                                <h3 class="text-xs font-bold text-slate-700 uppercase tracking-widest">Top Clients (LTV)</h3>
                            </div>
                            <div class="flex flex-col">
                                ${topCust.length > 0 ? topCust.map(c => `
                                    <div class="p-4 flex items-center justify-between border-b border-slate-100 last:border-0 hover:bg-slate-50 transition-colors">
                                        <div class="flex items-center gap-3 w-2/3">
                                            <div class="w-8 h-8 rounded bg-slate-100 flex items-center justify-center text-slate-700 font-bold text-xs uppercase shrink-0">${c.name.charAt(0)}</div>
                                            <div class="min-w-0">
                                                <p class="text-sm font-bold text-slate-900 truncate">${c.name}</p>
                                                <p class="text-[11px] font-medium text-slate-500 truncate mt-0.5">${c.company}</p>
                                            </div>
                                        </div>
                                        <p class="text-xs font-bold text-slate-900 bg-slate-100 px-2 py-1 rounded shrink-0">${app.formatCurrency(c.totalSpent)}</p>
                                    </div>
                                `).join('') : '<div class="p-6 text-center text-sm font-medium text-slate-500">No client data.</div>'}
                            </div>
                        </div>
                    </div>
                </div>
            </div>`;
        },

        // --- INVENTORY VIEW ---
        inventory() {
            const canAdd = app.hasPermission('inventory', 'add');
            const canEdit = app.hasPermission('inventory', 'edit');
            const canDelete = app.hasPermission('inventory', 'delete');

            const rows = app.state.db.inventory.map(i => {
                let statusClass = 'bg-emerald-100 text-emerald-800'; let statusText = 'In Stock';
                if (i.quantity == 0) { statusClass = 'bg-red-100 text-red-800'; statusText = 'Out of Stock'; }
                else if (i.quantity <= i.threshold) { statusClass = 'bg-amber-100 text-amber-800'; statusText = 'Low Stock'; }

                return `
                <tr class="hover:bg-slate-50 transition-colors border-b border-slate-200 last:border-0 item-row" data-search="${i.name.toLowerCase()} ${i.sku.toLowerCase()}">
                    <td class="px-6 py-4"><p class="font-bold text-slate-900">${i.name}</p><p class="font-mono text-xs font-semibold text-slate-500 mt-1">${i.sku}</p></td>
                    <td class="px-6 py-4"><p class="text-sm font-semibold text-slate-700">${i.category}</p><p class="text-xs font-medium text-slate-500 mt-1">${i.supplier}</p></td>
                    <td class="px-6 py-4"><div class="flex flex-col items-start gap-1"><span class="px-2 py-0.5 rounded text-[11px] font-bold uppercase tracking-wide ${statusClass}">${statusText}</span><span class="text-slate-500 font-medium text-xs mt-1">Qty: ${i.quantity} / Min: ${i.threshold}</span></div></td>
                    <td class="px-6 py-4 text-slate-900 font-bold text-sm">${app.formatCurrency(i.price)}</td>
                    <td class="px-6 py-4 text-right space-x-2 whitespace-nowrap">
                        ${canEdit ? `<button onclick="app.actions.openInventoryModal(${i.id})" class="text-brand-600 hover:text-brand-800 font-semibold text-sm transition">Edit</button>` : ''}
                        ${canDelete ? `<button onclick="app.actions.deleteInventory(${i.id})" class="text-red-600 hover:text-red-800 font-semibold text-sm transition ml-3">Delete</button>` : ''}
                    </td>
                </tr>`;
            }).join('');

            return `
            <div class="bg-white rounded-xl shadow-sm border border-slate-200 flex flex-col h-full overflow-hidden">
                <div class="p-5 border-b border-slate-200 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 bg-slate-50/50">
                    <div class="relative w-full sm:w-80">
                        <i data-lucide="search" class="w-4 h-4 text-slate-400 absolute left-3.5 top-1/2 transform -translate-y-1/2"></i>
                        <input type="text" placeholder="Search by name or SKU..." onkeyup="app.actions.filterTable(this.value)" class="w-full pl-10 pr-4 py-2 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent outline-none transition text-sm shadow-sm" />
                    </div>
                    ${canAdd ? `<button onclick="app.actions.openInventoryModal()" class="bg-brand-600 hover:bg-brand-700 text-white px-4 py-2 rounded-lg flex items-center gap-2 font-semibold transition text-sm shadow-sm whitespace-nowrap"><i data-lucide="plus" class="w-4 h-4"></i> Add Product</button>` : ''}
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse text-sm">
                        <thead>
                            <tr class="bg-slate-100/50 border-b border-slate-200">
                                <th class="px-6 py-3 font-bold text-slate-600 uppercase tracking-wider text-xs">Product Details</th>
                                <th class="px-6 py-3 font-bold text-slate-600 uppercase tracking-wider text-xs">Category / Vendor</th>
                                <th class="px-6 py-3 font-bold text-slate-600 uppercase tracking-wider text-xs">Stock Level</th>
                                <th class="px-6 py-3 font-bold text-slate-600 uppercase tracking-wider text-xs">Unit Price</th>
                                <th class="px-6 py-3 font-bold text-slate-600 uppercase tracking-wider text-xs text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody>${rows || `<tr><td colspan="5" class="p-12 text-center text-slate-500 font-medium">No records found.</td></tr>`}</tbody>
                    </table>
                </div>
            </div>`;
        },

        customers() { return `<div class="p-12 text-center text-slate-500 font-medium bg-white rounded-xl border border-slate-200">Customer Module Active. Structure follows Inventory template.</div>`; },
        accounts() { return `<div class="p-12 text-center text-slate-500 font-medium bg-white rounded-xl border border-slate-200">Financial Ledger Active. Structure follows Inventory template.</div>`; },
        profile() { 
            const data = app.state.db.profile;
            return `
            <div class="max-w-3xl mx-auto">
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="px-8 py-5 border-b border-slate-200 bg-slate-50/50 flex justify-between items-center">
                        <h2 class="text-xs font-bold text-slate-700 uppercase tracking-widest">Enterprise Profile</h2>
                        ${app.hasPermission('profile', 'edit') ? `<button class="text-brand-600 hover:text-brand-800 font-semibold text-sm transition flex items-center gap-1"><i data-lucide="edit-2" class="w-4 h-4"></i> Edit</button>` : ''}
                    </div>
                    <div class="p-8 space-y-8">
                        <div class="flex items-center gap-6">
                            <div class="w-20 h-20 rounded-xl bg-slate-900 flex items-center justify-center text-white font-black text-3xl shadow-sm shrink-0">${data.name ? data.name.charAt(0) : 'N'}</div>
                            <div>
                                <h1 class="text-2xl font-bold text-slate-900 tracking-tight">${data.name || 'Setup Pending'}</h1>
                                <p class="text-sm font-medium text-slate-500 mt-1 flex items-center gap-1.5"><i data-lucide="calendar" class="w-4 h-4"></i> Est. ${data.established}</p>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 gap-y-6 gap-x-12 text-sm border-t border-slate-100 pt-8">
                            <div><p class="text-slate-400 font-bold mb-1 text-[10px] uppercase tracking-widest">Email Address</p><p class="font-semibold text-slate-900">${data.email || '--'}</p></div>
                            <div><p class="text-slate-400 font-bold mb-1 text-[10px] uppercase tracking-widest">Phone Number</p><p class="font-semibold text-slate-900">${data.phone || '--'}</p></div>
                            <div><p class="text-slate-400 font-bold mb-1 text-[10px] uppercase tracking-widest">Website</p><p class="font-semibold text-slate-900">${data.website || '--'}</p></div>
                            <div><p class="text-slate-400 font-bold mb-1 text-[10px] uppercase tracking-widest">Tax ID / BIN</p><p class="font-mono font-semibold text-slate-900">${data.taxId || '--'}</p></div>
                            <div class="sm:col-span-2"><p class="text-slate-400 font-bold mb-1 text-[10px] uppercase tracking-widest">Registered Address</p><p class="font-semibold text-slate-900 leading-relaxed">${data.address || '--'}</p></div>
                        </div>
                    </div>
                </div>
            </div>`; 
        }
    },

    /**
     * ==========================================
     * ACTIONS / EVENT HANDLERS
     * ==========================================
     */
    actions: {
        login(e) {
            e.preventDefault();
            const fd = new FormData(e.target);
            const user = INITIAL_USERS.find(u => u.username === fd.get('username') && u.password === fd.get('password'));
            if (user) {
                if (['admin', 'editor', 'mod'].includes(user.username)) {
                    app.state.db = JSON.parse(JSON.stringify(INITIAL_DB)); // Load mock data for test users
                }
                app.state.authError = '';
                app.state.user = user;
                app.state.currentTab = 'dashboard';
                app.render();
            } else {
                app.state.authError = 'Authentication failed. Please check credentials.';
                app.render();
            }
        },

        register(e) {
            e.preventDefault();
            const fd = new FormData(e.target);
            const u = fd.get('username');
            
            if (INITIAL_USERS.some(usr => usr.username === u)) {
                app.state.authError = 'User ID already exists.';
                app.render();
                return;
            }
            
            const newUser = { id: Date.now(), username: u, password: fd.get('password'), role: 'admin', name: fd.get('fullname') };
            INITIAL_USERS.push(newUser);
            
            app.state.db = JSON.parse(JSON.stringify(EMPTY_DB)); // Fresh slate
            app.state.authError = '';
            app.state.user = newUser;
            app.state.currentTab = 'induction';
            app.render();
        },

        completeInduction(e) {
            e.preventDefault();
            const fd = new FormData(e.target);
            app.state.db.profile.name = fd.get('name');
            app.state.db.profile.email = fd.get('email');
            app.state.currentTab = 'dashboard';
            app.render();
        },

        openInventoryModal(id = null) {
            const item = id ? app.state.db.inventory.find(i => i.id === id) : { name:'', sku:'', category:'', supplier:'', quantity:'', threshold:'10', price:'' };
            const content = `
                <input type="hidden" name="id" value="${id || ''}" />
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-5 text-sm">
                    <div class="sm:col-span-2"><label class="block font-semibold text-slate-700 mb-1.5">Product Name</label><input name="name" required value="${item.name}" class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:bg-white focus:ring-2 focus:ring-brand-500 outline-none transition" /></div>
                    <div><label class="block font-semibold text-slate-700 mb-1.5">SKU</label><input name="sku" required value="${item.sku}" class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:bg-white focus:ring-2 focus:ring-brand-500 outline-none font-mono text-sm transition" /></div>
                    <div><label class="block font-semibold text-slate-700 mb-1.5">Category</label><input name="category" required value="${item.category}" class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:bg-white focus:ring-2 focus:ring-brand-500 outline-none transition" /></div>
                    <div class="sm:col-span-2"><label class="block font-semibold text-slate-700 mb-1.5">Supplier</label><input name="supplier" required value="${item.supplier}" class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:bg-white focus:ring-2 focus:ring-brand-500 outline-none transition" /></div>
                    <div><label class="block font-semibold text-slate-700 mb-1.5">Quantity</label><input name="quantity" type="number" min="0" required value="${item.quantity}" class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:bg-white focus:ring-2 focus:ring-brand-500 outline-none transition" /></div>
                    <div><label class="block font-semibold text-slate-700 mb-1.5">Min Threshold</label><input name="threshold" type="number" min="0" required value="${item.threshold}" class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:bg-white focus:ring-2 focus:ring-brand-500 outline-none transition" /></div>
                    <div class="sm:col-span-2"><label class="block font-semibold text-slate-700 mb-1.5">Unit Price (৳)</label><input name="price" type="number" min="0" step="0.01" required value="${item.price}" class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:bg-white focus:ring-2 focus:ring-brand-500 outline-none transition" /></div>
                </div>`;
            app.actions.showModal(id ? 'Edit Item' : 'Add New Item', content, 'app.actions.saveInventory');
        },

        saveInventory(e) {
            e.preventDefault();
            const fd = new FormData(e.target);
            const id = fd.get('id');
            const data = Object.fromEntries(fd.entries());
            delete data.id;

            if (id) {
                const idx = app.state.db.inventory.findIndex(i => i.id == id);
                if (idx > -1) app.state.db.inventory[idx] = { id: Number(id), ...data };
            } else {
                app.state.db.inventory.push({ id: Date.now(), ...data });
            }
            app.actions.closeModal();
            app.render();
        },

        deleteInventory(id) {
            if (confirm('Permanently delete this item?')) {
                app.state.db.inventory = app.state.db.inventory.filter(i => i.id !== id);
                app.render();
            }
        },

        filterTable(query) {
            query = query.toLowerCase();
            document.querySelectorAll('.item-row').forEach(row => {
                row.style.display = row.getAttribute('data-search').includes(query) ? '' : 'none';
            });
        },

        showModal(title, content, submitHandler) {
            document.getElementById('modal-root').innerHTML = `
                <div class="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-[100] p-4 backdrop-blur-sm fade-in">
                    <div class="bg-white rounded-xl shadow-2xl w-full max-w-xl overflow-hidden flex flex-col max-h-[90vh] slide-up">
                        <div class="px-6 py-4 border-b border-slate-200 bg-slate-50 shrink-0 flex justify-between items-center">
                            <h3 class="font-bold text-slate-900">${title}</h3>
                            <button type="button" onclick="app.actions.closeModal()" class="text-slate-400 hover:text-slate-700 transition"><i data-lucide="x" class="w-5 h-5"></i></button>
                        </div>
                        <form onsubmit="${submitHandler}(event)" class="flex flex-col overflow-hidden h-full">
                            <div class="p-6 overflow-y-auto flex-1">${content}</div>
                            <div class="px-6 py-4 border-t border-slate-200 bg-slate-50 shrink-0 flex justify-end gap-3">
                                <button type="button" onclick="app.actions.closeModal()" class="px-5 py-2.5 text-slate-700 bg-white border border-slate-300 hover:bg-slate-50 rounded-lg font-semibold transition text-sm shadow-sm">Cancel</button>
                                <button type="submit" class="px-5 py-2.5 bg-brand-600 hover:bg-brand-700 text-white rounded-lg font-semibold transition text-sm shadow-sm">Save Details</button>
                            </div>
                        </form>
                    </div>
                </div>`;
            lucide.createIcons();
        },

        closeModal() {
            document.getElementById('modal-root').innerHTML = '';
        }
    }
};

// Initialize
document.addEventListener('DOMContentLoaded', () => app.init());

</script>
</body>
</html>
